<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리전교부회장있다 - 스터디 앱</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; background-color: #f4f6f9; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 50px auto; }
        .screen { display: none; } 
        .active-screen { display: block; } 
        button { width: 90%; padding: 15px; margin: 10px 0; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-google { background-color: #ffffff; color: #333; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google img { width: 20px; }
        .btn-primary { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div id="loginScreen" class="container screen active-screen">
    <h1>📚 스터디 앱 로그인</h1>
    <p>반 친구들과 함께 나무를 키워보자!</p>
    <button class="btn-google" id="googleLoginBtn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
        Google 계정으로 시작하기
    </button>
</div>

<div id="mainScreen" class="container screen">
    <h2 id="userNameDisplay">환영합니다!</h2>
    <p id="userEmailDisplay"></p>
    <button class="btn-primary" onclick="location.reload()">로그아웃 (새로고침)</button>
</div>

<script type="module">
    // 파이어베이스 핵심 기능과 인증 기능 임포트
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // ⭐️ 여기에 파이어베이스 콘솔에서 복사한 너희들의 코드를 붙여넣어야 해! ⭐️
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_ID",
        appId: "YOUR_APP_ID"
    };

    // 파이어베이스 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 화면 전환 함수
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
    }

    // 구글 로그인 버튼 클릭 이벤트
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        try {
            // 구글 로그인 팝업 띄우기
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            
            // 로그인 성공 시 정보 확인
            console.log("로그인 성공!", user);
            
            // 화면에 이름과 이메일 띄워주기
            document.getElementById('userNameDisplay').innerText = `${user.displayName}님, 환영합니다!`;
            document.getElementById('userEmailDisplay').innerText = `접속 계정: ${user.email}`;
            
            // 메인 화면으로 전환
            showScreen('mainScreen');

        } catch (error) {
            console.error("로그인 실패:", error.message);
            alert("로그인에 실패했습니다. 다시 시도해주세요.");
        }
    });
</script>

</body>
</html>
